<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadet Lesson Plans - Create Lesson</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="siteHeader"></div>

    <main>
      <section class="panel">
        <h1>Create Lesson Plan</h1>
        <p class="muted" id="authState">Checking sign-in state...</p>
        <p id="createStatus"></p>

        <form id="createLessonForm" enctype="multipart/form-data">
          <label>
            Lesson Code
            <input name="code" type="text" required placeholder="M123.01" />
          </label>

          <label>
            Lesson Name
            <input name="name" type="text" required placeholder="Learn to swim" />
          </label>

          <label>
            Lesson Plan File (.docx, .pdf, .txt)
            <input name="lessonPlan" type="file" accept=".docx,.pdf,.txt" required />
          </label>

          <label>
            Slideshow File (optional: .pptx, .ppt, .pdf)
            <input name="slideshow" type="file" accept=".pptx,.ppt,.pdf" />
          </label>

          <button class="primary" type="submit">Create Lesson Plan</button>
        </form>
      </section>
    </main>

    <div id="siteFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"></script>
    <script src="assets/js/pb.js"></script>
    <script src="assets/js/include-loader.js"></script>
    <script src="assets/js/create.js"></script>
  </body>
</html>
