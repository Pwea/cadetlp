<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Cadet Lesson Plans - Home</title>
		<link rel="stylesheet" href="assets/css/styles.css" />
	</head>
	<body>
		<div id="siteHeader"></div>

		<main>
			<section class="panel">
				<h1>All Lesson Plans</h1>
				<p class="muted" id="authState">Checking sign-in state...</p>
				<div class="search-row">
					<label class="search-label" for="lessonSearch">Search by lesson name or code</label>
					<input id="lessonSearch" type="search" placeholder="Type a name or code..." autocomplete="off" />
				</div>
				<p id="listStatus"></p>
				<div id="lessonList" class="grid" aria-live="polite"></div>
			</section>
		</main>

		<div id="siteFooter"></div>

		<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"></script>
		<script src="assets/js/pb.js"></script>
		<script src="assets/js/include-loader.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
